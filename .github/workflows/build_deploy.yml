name: Publish package to pub.dev
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  test:
    name: Test (root + example)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Flutter pub get (root)
        run: flutter pub get

      - name: Flutter test (root)
        run: flutter test

      - name: Flutter pub get (example)
        working-directory: example
        run: flutter pub get

      - name: Flutter test (example)
        working-directory: example
        run: flutter test

  verify:
    name: Verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    needs: [test]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            timeout: 45
          - target: ios
            os: macos-latest
            timeout: 60
    env:
      CI: true
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Dorg.gradle.caching=true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            example/android/**/*.gradle*
            example/android/**/gradle-wrapper.properties
            example/android/gradle.properties

      - name: Set up Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Cache CocoaPods
        if: matrix.target == 'ios'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
            example/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Cache CocoaPods gem
        if: matrix.target == 'ios'
        uses: actions/cache@v4
        with:
          path: ~/.gem
          key: ${{ runner.os }}-cocoapods-gem-v1

      - name: Add user gem bin to PATH
        if: matrix.target == 'ios'
        run: echo "$(ruby -r rubygems -e 'print Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Install CocoaPods
        if: matrix.target == 'ios'
        run: gem list -i cocoapods || gem install cocoapods -N --user-install

      - name: Flutter pub get (root)
        run: flutter pub get

      - name: Flutter pub get (example)
        working-directory: example
        run: flutter pub get

      - name: Flutter clean (example)
        working-directory: example
        run: flutter clean

      - name: Build example APK (debug, verbose)
        if: matrix.target == 'android'
        working-directory: example
        run: flutter build apk --debug -v

      - name: Build example iOS (no-codesign, verbose)
        if: matrix.target == 'ios'
        working-directory: example
        run: flutter build ios --no-codesign -v

  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest
    needs: [verify]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - run: flutter --version

      - run: flutter pub get

      - name: Publish package
        run: flutter pub publish --force

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release notes from CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Could not find CHANGELOG entry for version ${version}"
            exit 1
          fi

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file release_notes.md
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file release_notes.md \
              --latest
          fi
